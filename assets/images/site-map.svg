<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="Illustrated site map with three clickable regions.">
  <title>Site Map</title>
  <desc>An illustrated scene used as a classic HTML image map. The sun, house, and signpost are clickable hotspots.</desc>

  <!-- Sky -->
  <rect x="0" y="0" width="800" height="320" fill="#cfe6ff"/>
  <!-- Ground -->
  <rect x="0" y="320" width="800" height="180" fill="#bfe2b6"/>
  <!-- Horizon line -->
  <line x1="0" y1="320" x2="800" y2="320" stroke="#6b8f63" stroke-width="2"/>

  <!-- A few clouds -->
  <g fill="#ffffff" opacity="0.9">
    <ellipse cx="170" cy="90" rx="50" ry="18"/>
    <ellipse cx="210" cy="80" rx="40" ry="20"/>
    <ellipse cx="450" cy="60" rx="60" ry="16"/>
  </g>

  <!-- SUN (circle hotspot) cx=680, cy=110, r=55 -->
  <g>
    <circle cx="680" cy="110" r="55" fill="#ffd14a" stroke="#e0a020" stroke-width="3"/>
    <g stroke="#e0a020" stroke-width="4" stroke-linecap="round">
      <line x1="680" y1="30"  x2="680" y2="10"/>
      <line x1="680" y1="190" x2="680" y2="210"/>
      <line x1="600" y1="110" x2="580" y2="110"/>
      <line x1="760" y1="110" x2="780" y2="110"/>
      <line x1="625" y1="55"  x2="610" y2="40"/>
      <line x1="735" y1="55"  x2="750" y2="40"/>
      <line x1="625" y1="165" x2="610" y2="180"/>
      <line x1="735" y1="165" x2="750" y2="180"/>
    </g>
    <text x="680" y="116" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#5a3a00">Home</text>
  </g>

  <!-- HOUSE (rect hotspot) bounding x=80..300, y=210..420 -->
  <g>
    <!-- Body -->
    <rect x="100" y="270" width="180" height="150" fill="#f4e0c1" stroke="#9a6b3a" stroke-width="3"/>
    <!-- Roof -->
    <polygon points="80,270 190,180 300,270" fill="#b3543b" stroke="#7a2f1d" stroke-width="3"/>
    <!-- Door -->
    <rect x="170" y="340" width="40" height="80" fill="#7a4a22" stroke="#3a1f0a" stroke-width="2"/>
    <circle cx="202" cy="380" r="2.5" fill="#f1c14a"/>
    <!-- Window -->
    <rect x="120" y="295" width="40" height="40" fill="#bfe4ff" stroke="#3a1f0a" stroke-width="2"/>
    <line x1="140" y1="295" x2="140" y2="335" stroke="#3a1f0a" stroke-width="2"/>
    <line x1="120" y1="315" x2="160" y2="315" stroke="#3a1f0a" stroke-width="2"/>
    <text x="190" y="445" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="#3a1f0a">About</text>
  </g>

  <!-- SIGNPOST (polygon hotspot) -->
  <!-- Signpost board polygon points: 430,230  600,230  640,290  600,350  430,350  390,290 -->
  <g>
    <!-- Post -->
    <rect x="505" y="350" width="20" height="90" fill="#7a4a22" stroke="#3a1f0a" stroke-width="2"/>
    <!-- Arrow-shaped board -->
    <polygon points="430,230 600,230 640,290 600,350 430,350 390,290"
             fill="#fff7d6" stroke="#9a6b3a" stroke-width="3"/>
    <text x="515" y="285" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="bold" fill="#3a1f0a">Who's driving?</text>
    <text x="515" y="315" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#6a4a22">(an essay)</text>
  </g>

  <!-- Small label so viewers know what the picture is -->
  <text x="20" y="30" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#345" opacity="0.7">site map prototype</text>
</svg>
